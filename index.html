<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trust Me Bro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="landing">
    <div class="landing-bg"></div>
    <main class="landing-hero">
      <div class="landing-wrap">
        <div class="landing-copy">
          <h1>Trust Me Bro</h1>
          <p class="landing-tagline"><i>play stupid games, win stupid prizes</i><p>

          <p class="landing-kicker">a (terrible) stock market simulator where no one is your friend</p>
          <div class="landing-details">
            <div>
              <span>Advice?</span>
              <strong>Terrible</strong>
            </div>
            <div>
              <span>Portfolio?</span>
              <strong>Sketchy</strong>
            </div>
            <div>
              <span>Liquidity?</span>
              <strong>Gone</strong>
            </div>
          </div>
        </div>

        <div class="landing-phone">
          <div class="phone-shell">
            <div class="phone-top">
              <span class="phone-speaker"></span>
              <span class="phone-camera"></span>
            </div>
            <div class="phone-screen">
              <div class="landing-screen">
                <div class="landing-screen-header">
                  <span class="landing-chip">Private Access</span>
                  <h2>Enter the market.</h2>
                  <p>Drop the password to unlock the phone.</p>
                </div>
                <form class="landing-form" id="landing-form">
                  <label for="landing-password">Password</label>
                  <input
                    id="landing-password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="********"
                    required
                  />
                  <button type="submit" id="landing-play">Play</button>
                  <p class="landing-message" id="landing-message" role="status"></p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById("landing-form");
      const button = document.getElementById("landing-play");
      const message = document.getElementById("landing-message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.getElementById("landing-password").value.trim();
        if (!password) {
          message.textContent = "Enter the password.";
          message.dataset.status = "error";
          return;
        }

        button.disabled = true;
        message.textContent = "Checking...";
        message.dataset.status = "busy";

        try {
          const response = await fetch("/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          if (!response.ok) {
            throw new Error("Invalid password");
          }

          const data = await response.json();
          if (data?.ok) {
            window.location.href = "/game.html";
            return;
          }

          throw new Error("Invalid password");
        } catch (error) {
          message.textContent = "Nope. Try again.";
          message.dataset.status = "error";
          form.classList.remove("shake");
          void form.offsetWidth;
          form.classList.add("shake");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
