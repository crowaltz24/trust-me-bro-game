<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trust Me Bro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Trust Me Bro</h1>
          <p class="subtitle"><i>play stupid games, win stupid prizes</i></p>
        </div>
      </header>

      <main class="grid">
        <section class="panel main-panel">
          <div class="panel-header">
            <div class="tabs">
              <button class="tab active" data-tab="stocks">Stocks</button>
              <button class="tab" data-tab="crypto">Crypto</button>
            </div>
            <div class="controls">
              <button id="pause-btn">Pause</button>
            </div>
          </div>

          <div class="chart-wrap">
            <canvas id="price-chart" width="900" height="260"></canvas>
            <div class="chart-meta">
              <div>
                <h2 id="active-asset">DDY</h2>
                <p id="asset-description">Meme stock</p>
              </div>
              <div class="price-info">
                <div>
                  <span>Price</span>
                  <strong id="asset-price">$0</strong>
                </div>
                <div>
                  <span>Sentiment</span>
                  <strong id="asset-sentiment">0.00</strong>
                </div>
                <div>
                  <span>Volatility</span>
                  <strong id="asset-volatility">0.00</strong>
                </div>
              </div>
            </div>
          </div>

          <div class="trade-grid">
            <div class="panel sub-panel">
              <div class="panel-top">
                <h3>Trade</h3>
                <div class="trade-actions">
                  <button id="buy-btn">Buy</button>
                  <button id="sell-btn" class="secondary">Sell</button>
                </div>
              </div>
              <label>
                Asset
                <select id="asset-select"></select>
              </label>
              <label>
                Amount (shares/coins)
                <input id="trade-amount" type="number" min="1" step="1" value="10" />
              </label>
            </div>
            <div class="panel sub-panel">
              <div class="panel-top portfolio-header">
                <h3>Portfolio</h3>
                <div class="portfolio-total">
                  <strong id="portfolio-total">$0</strong>
                </div>
              </div>
              <div class="portfolio" id="portfolio-list"></div>
            </div>
          </div>
        </section>

        <aside class="phone">
          <div class="phone-shell">
            <div class="phone-top">
              <span class="phone-speaker"></span>
              <span class="phone-camera"></span>
            </div>
            <div class="phone-screen">
              <div class="phone-header">
                <h3>Phone</h3>
                <div class="phone-actions">
                  <div class="phone-tabs">
                    <button class="phone-tab active" data-phone="chat">Chats</button>
                    <button class="phone-tab" data-phone="social">Feed</button>
                  </div>
                  <button id="settings-btn" class="secondary">⚙</button>
                </div>
              </div>

              <div class="phone-settings" id="phone-settings">
                <div class="phone-settings-header">
                  <h4>Settings</h4>
                  <button id="settings-close" class="secondary">Close</button>
                </div>
                <button id="settings-reset">Reset Run</button>
              </div>

              <div class="phone-body">
                <div class="phone-panel active" id="phone-chat">
                  <div class="chat-list-view active" id="chat-list-view">
                    <div class="feed-header">
                      <h4>Contacts</h4>
                    </div>
                    <div class="chat-list" id="contact-list"></div>
                  </div>

                  <div class="chat-thread-view" id="chat-thread-view">
                    <div class="chat-thread-header">
                      <button id="back-to-contacts" class="secondary">&lt;</button>
                      <div>
                        <h4 id="chat-contact-name">Contact</h4>
                        <p class="contact-meta" id="chat-contact-style"></p>
                      </div>
                    </div>
                    <div class="chat" id="chat-log"></div>
                    <div class="chat-actions">
                      <button id="advice-btn">Chat</button>
                      <button id="follow-btn" class="secondary">Follow Advice</button>
                    </div>
                  </div>
                </div>

                <div class="phone-panel" id="phone-social">
                  <div class="feed-header">
                    <h4>Social + News</h4>
                    <button id="refresh-feed">Refresh</button>
                  </div>
                  <div class="feed-body" id="feed-list"></div>
                </div>
              </div>

              <div class="phone-footer status">
                <div><span>Day</span> <strong id="day-count">1</strong></div>
                <div><span>Time</span> <strong id="day-timer">04:59</strong></div>
                <div><span>Cash</span> <strong id="cash-balance">$0</strong></div>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
