<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trust Me Bro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="landing">
    <div class="landing-bg"></div>
    <main class="landing-hero">
      <div class="landing-wrap">
        <div class="landing-copy">
          <h1>Trust Me Bro</h1>
          <p class="landing-tagline"><i>play stupid games, win stupid prizes</i></p>
          <p class="landing-kicker">a (bad) stock market simulator where no one is your friend</p>
          <div class="landing-details">
            <div>
              <span>Advice?</span>
              <strong>Terrible</strong>
            </div>
            <div>
              <span>Portfolio?</span>
              <strong>Sketchy</strong>
            </div>
            <div>
              <span>Liquidity?</span>
              <strong>Gone</strong>
            </div>
          </div>
        </div>

        <div class="landing-phone">
          <div class="phone-shell">
            <div class="phone-top">
              <span class="phone-speaker"></span>
              <span class="phone-camera"></span>
            </div>
            <div class="phone-screen">
              <div class="landing-screen">
                <div class="landing-screen-header" id="landing-header">
                  <span class="landing-chip">Private Access</span>
                  <h2>Enter the market.</h2>
                  <p>Drop the password to unlock the phone.</p>
                </div>
                <form class="landing-form" id="landing-form">
                  <label for="landing-password">Password</label>
                  <input
                    id="landing-password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="********"
                    required
                  />
                  <button type="submit" id="landing-play">Play</button>
                  <p class="landing-message" id="landing-message" role="status"></p>
                </form>
                <div class="landing-start" id="landing-start">
                  <button type="button" id="landing-continue">Continue game</button>
                  <p class="landing-message" id="landing-start-message" role="status"></p>
                  <button type="button" class="secondary" id="landing-new">New game</button>
                </div>
                <div class="landing-cutscene" id="landing-cutscene">
                  <div class="landing-cutscene-header">Babe &lt;3</div>
                  <div class="chat landing-chat" id="landing-chat"></div>
                  <button type="button" id="landing-cutscene-continue">Continue</button>
                  <p class="landing-message" id="landing-cutscene-message" role="status"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById("landing-form");
      const button = document.getElementById("landing-play");
      const message = document.getElementById("landing-message");
      const startPanel = document.getElementById("landing-start");
      const startMessage = document.getElementById("landing-start-message");
      const continueBtn = document.getElementById("landing-continue");
      const newBtn = document.getElementById("landing-new");
      const headerPanel = document.getElementById("landing-header");
      const cutscenePanel = document.getElementById("landing-cutscene");
      const cutsceneLog = document.getElementById("landing-chat");
      const cutsceneMessage = document.getElementById("landing-cutscene-message");
      const cutsceneContinue = document.getElementById("landing-cutscene-continue");
      const SAVE_KEY = "meme-market-save";
      const START_MODE_KEY = "meme-market-start";
      const INTRO_SEEN_KEY = "meme-market-intro-seen";
      const ping = new Audio("/assets/notification.mp3");
      ping.volume = 0.55;

      const showStartOptions = () => {
        form.classList.add("is-hidden");
        startPanel.classList.add("active");
        const hasSave = Boolean(localStorage.getItem(SAVE_KEY));
        continueBtn.disabled = !hasSave;
        startMessage.textContent = hasSave ? "Pick up where you left off." : "No save found.";
        startMessage.dataset.status = hasSave ? "" : "error";
      };

      continueBtn.addEventListener("click", () => {
        sessionStorage.setItem(START_MODE_KEY, "continue");
        window.location.href = "/game.html";
      });

      newBtn.addEventListener("click", () => {
        const shouldPlayIntro = !localStorage.getItem(INTRO_SEEN_KEY);
        sessionStorage.setItem(START_MODE_KEY, "new");
        if (!shouldPlayIntro) {
          window.location.href = "/game.html";
          return;
        }
        playCutscene();
      });

      const playCutscene = () => {
        form.classList.add("is-hidden");
        startPanel.classList.remove("active");
        cutscenePanel.classList.add("active");
        headerPanel.classList.add("is-hidden");
        cutsceneLog.innerHTML = "";
        cutsceneMessage.textContent = "";
        cutsceneContinue.disabled = true;
        cutsceneContinue.classList.remove("active");

        const messages = [
          "Babe <3: listen, you're great... but you don't make enough money for me. this just isnt gonna work out.",
          "You: wait no please ill do better its the job market no ones hiring vibecoders",
          "Babe <3: i lied ur not that great. but, if ur broke ahh can make a 100 grand in 7 days i'll THINK about giving you another chance",
          "You: what",
          "Babe <3: you heard me. see u then",
          "This contact has blocked you.",
          "You: wait :(",
        ];

        const shouldPing = (text) =>
          text.startsWith("Babe <3:") || text === "This contact has blocked you.";

        const stepMs = 3300;
        messages.forEach((text, index) => {
          setTimeout(() => {
            const div = document.createElement("div");
            div.className = "msg";
            div.textContent = text;
            cutsceneLog.appendChild(div);
            cutsceneLog.scrollTop = cutsceneLog.scrollHeight;
            if (shouldPing(text)) {
              try {
                const sound = ping.cloneNode(true);
                sound.volume = ping.volume;
                sound.play();
              } catch (error) {
                // Ignore autoplay failures.
              }
            }
          }, stepMs * index);
        });

        localStorage.setItem(INTRO_SEEN_KEY, "1");
        setTimeout(() => {
          cutsceneMessage.textContent = "time to win her back";
          cutsceneContinue.disabled = false;
          cutsceneContinue.classList.add("active");
        }, stepMs * messages.length + 400);
      };

      cutsceneContinue.addEventListener("click", () => {
        window.location.href = "/game.html";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.getElementById("landing-password").value.trim();
        if (!password) {
          message.textContent = "Enter the password.";
          message.dataset.status = "error";
          return;
        }

        button.disabled = true;
        message.textContent = "Checking...";
        message.dataset.status = "busy";

        try {
          const response = await fetch("/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          if (!response.ok) {
            throw new Error("Invalid password");
          }

          const data = await response.json();
          if (data?.ok) {
            showStartOptions();
            return;
          }

          throw new Error("Invalid password");
        } catch (error) {
          // showStartOptions();
          message.textContent = "Nope. Try again.";
          message.dataset.status = "error";
          form.classList.remove("shake");
          void form.offsetWidth;
          form.classList.add("shake");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
